name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-format-lib:
    name: Build alamo_format + tools (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTING=ON

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Verify CLI artifacts exist
        shell: pwsh
        run: |
          $tools = @(
            'build\tools\alo_dump\Release\alo_dump.exe',
            'build\tools\alo_roundtrip\Release\alo_roundtrip.exe'
          )
          foreach ($tool in $tools) {
            if (-not (Test-Path $tool)) {
              throw "Expected build artifact missing: $tool"
            }
            Write-Host "OK: $tool"
          }

      - name: Run unit tests
        working-directory: build
        run: ctest --build-config Release --output-on-failure --no-tests=error

  # Note: the max2alamo .dle is intentionally NOT built here. The 3ds Max 2026
  # SDK is not redistributable, so the plugin builds only on developer machines
  # with the SDK installed. Local-build instructions live in docs/build.md.
