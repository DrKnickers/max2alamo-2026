name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-format-lib:
    name: Build alamo_format + tools (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Smoke-test CLIs
        shell: pwsh
        run: |
          # Stubs return non-zero on purpose; we only verify they execute.
          $exit = (& .\build\tools\alo_dump\Release\alo_dump.exe 2>&1; $LASTEXITCODE)
          Write-Host "alo_dump exited $exit (non-zero is expected for the Phase 0 stub)"
          $exit = (& .\build\tools\alo_roundtrip\Release\alo_roundtrip.exe 2>&1; $LASTEXITCODE)
          Write-Host "alo_roundtrip exited $exit (non-zero is expected for the Phase 0 stub)"

  # Note: the max2alamo .dle is intentionally NOT built here. The 3ds Max 2026
  # SDK is not redistributable, so the plugin builds only on developer machines
  # with the SDK installed. Local-build instructions live in docs/build.md.
